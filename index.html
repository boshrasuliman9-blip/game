<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>أنت حساس الدوران</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:system-ui,sans-serif; background:#f4f4f0; min-height:100vh; }
#credit { position:fixed; bottom:8px; right:12px; font-size:11px; color:#aaa; z-index:9999; }
#logo { position:fixed; top:0; left:0; width:70px; z-index:100; }

/* ─── START ─── */
#pg-start { display:block; padding:5rem 1rem 2rem; max-width:480px; margin:0 auto; text-align:center; }
#pg-start h1 { font-size:26px; font-weight:700; margin-bottom:1.5rem; }
.rules-box { background:#fff; border:1px solid #ddd; border-radius:14px; padding:1.2rem 1.4rem; text-align:right; margin-bottom:1.5rem; }
.rules-box h2 { font-size:15px; font-weight:700; margin-bottom:10px; }
.rules-box ul { padding-right:1.2rem; color:#555; font-size:14px; line-height:2.2; }
.rules-box ul li strong { color:#111; }
#btn-start { display:inline-block; font-size:18px; font-weight:700; padding:16px 52px; border-radius:12px; border:none; background:#111; color:#fff; cursor:pointer; -webkit-tap-highlight-color:transparent; }

/* ─── GAME ─── */
#pg-game { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#e8e6de; z-index:10; }
#color-fill { position:absolute; top:0; left:0; width:100%; height:100%; background:#e8e6de; }
#stars-box { position:absolute; top:20px; left:50%; transform:translateX(-50%); text-align:center; z-index:20; }
#stars-label { font-size:13px; font-weight:600; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.5); margin-bottom:4px; }
#stars-row { display:flex; gap:6px; justify-content:center; }
.star { font-size:30px; }
#hint { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:60px; font-weight:900; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,.4); pointer-events:none; z-index:20; }
#announce {
  display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(20,20,20,.88); color:#fff; border-radius:18px;
  padding:24px 32px; text-align:center; font-size:20px; font-weight:700;
  line-height:1.6; z-index:30; min-width:240px;
}
#btn-stop {
  position:absolute; bottom:30px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,.35); color:#fff; border:none; border-radius:10px;
  padding:12px 30px; font-size:15px; cursor:pointer; z-index:40;
  -webkit-tap-highlight-color:transparent;
}

/* ─── CONGRATS ─── */
#pg-win { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#fff; z-index:50; flex-direction:column; align-items:center; justify-content:center; gap:1rem; text-align:center; }
#pg-win img { width:210px; height:auto; }
#pg-win .big { font-size:28px; font-weight:900; }
#pg-win .sub { font-size:16px; color:#444; line-height:1.8; }
#btn-again { font-size:16px; font-weight:700; padding:14px 40px; border-radius:12px; border:none; background:#111; color:#fff; cursor:pointer; margin-top:8px; -webkit-tap-highlight-color:transparent; }
</style>
</head>

<script>
/* ── pages ── */
function show(id) { document.getElementById(id).style.display = (id==='pg-win'?'flex':'block'); }
function hide(id) { document.getElementById(id).style.display = 'none'; }

/* ── audio ── */
var ctx = null;
function ac() {
  if (!ctx) ctx = new (window.AudioContext||window.webkitAudioContext)();
  if (ctx.state==='suspended') ctx.resume();
  return ctx;
}
function beep(f,t,d,v,dl) {
  dl = dl||0; try {
    var c=ac(), o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(v, c.currentTime+dl);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime+dl+d);
    o.start(c.currentTime+dl); o.stop(c.currentTime+dl+d+.05);
  } catch(e){}
}
function sfxColor()  { beep(520,'sine',.12,.3); }
function sfxStar()   { beep(880,'sine',.15,.25); }
function sfxLevel()  { beep(523,'sine',.18,.3); beep(659,'sine',.18,.3,.18); beep(784,'sine',.28,.3,.36); }
function sfxWin()    { beep(523,'sine',.15,.3); beep(659,'sine',.15,.3,.15); beep(784,'sine',.15,.3,.3); beep(1047,'sine',.4,.35,.45); }

/* ── game state ── */
var TIM=null, colorOn=false, paused=false, total=0, levelStars=0;
var LEVELS=[
  {n:1,hold:2500,gap:1500},{n:2,hold:2000,gap:1300},
  {n:3,hold:1400,gap:1000},{n:4,hold:900,gap:700},{n:5,hold:600,gap:500}
];
var PER=3, NAMES=["الأولى","الثانية","الثالثة","الرابعة","الخامسة"];
var COLORS={red:"#E24B4A",green:"#5AAA2A"};
function li() { return Math.min(Math.floor(total/PER), LEVELS.length-1); }
function lv() { return LEVELS[li()]; }

function stars(n) {
  var r=document.getElementById('stars-row'); r.innerHTML='';
  for(var i=0;i<PER;i++){
    var s=document.createElement('span');
    s.className='star'; s.textContent='★';
    s.style.color=i<n?'#FFD700':'rgba(255,255,255,.3)';
    if(i===n-1&&n>0){s.style.transform='scale(1.4)';(function(el){setTimeout(function(){el.style.transform='scale(1)';},300);})(s);}
    r.appendChild(s);
  }
}

/* ── actions ── */
function doStart() {
  ac(); // unlock audio on user gesture
  total=0; levelStars=0; colorOn=false; paused=false;
  hide('pg-start');
  hide('logo');
  show('pg-game');
  document.getElementById('stars-label').textContent='المرحلة 1';
  stars(0);
  nextRound();
}

function doStop() {
  clearTimeout(TIM); colorOn=false; paused=false;
  hide('pg-game');
  document.getElementById('color-fill').style.background='#e8e6de';
  document.getElementById('announce').style.display='none';
  show('pg-start');
  show('logo');
}

function doAgain() {
  hide('pg-win');
  show('pg-start');
  show('logo');
}

function nextRound() {
  if(paused) return;
  colorOn=false;
  document.getElementById('color-fill').style.background='#e8e6de';
  document.getElementById('hint').textContent='';
  TIM=setTimeout(showColor, lv().gap);
}

function showColor() {
  if(paused) return;
  colorOn=true; total++; levelStars++;
  var cs=['red','green'], c=cs[Math.floor(Math.random()*2)];
  document.getElementById('color-fill').style.background=COLORS[c];
  sfxColor();
  var idx=li();
  document.getElementById('hint').textContent = idx<=2?(c==='red'?'يمين':'يسار'):'';
  document.getElementById('stars-label').textContent='المرحلة '+LEVELS[idx].n;
  stars(levelStars); sfxStar();
  TIM=setTimeout(function(){
    colorOn=false;
    document.getElementById('color-fill').style.background='#e8e6de';
    document.getElementById('hint').textContent='';
    if(levelStars>=PER){ paused=true; TIM=setTimeout(doLevelEnd,3500); }
    else nextRound();
  }, lv().hold);
}

function doLevelEnd() {
  var idx=li();
  if(total>=LEVELS.length*PER){ doWin(); return; }
  var msg='مبروك! لقد اجتزت المرحلة '+NAMES[idx-1]+' بنجاح 🎉';
  var ann=document.getElementById('announce');
  ann.textContent=msg; ann.style.display='block'; sfxLevel();
  TIM=setTimeout(function(){
    ann.style.display='none';
    levelStars=0; paused=false; stars(0);
    document.getElementById('stars-label').textContent='المرحلة '+LEVELS[idx].n;
    nextRound();
  },3000);
}

function doWin() {
  hide('pg-game'); show('pg-win'); sfxWin();
}

function tapGame() {
  if(!colorOn||paused) return;
  clearTimeout(TIM); colorOn=false;
  document.getElementById('color-fill').style.background='#e8e6de';
  document.getElementById('hint').textContent='';
  if(levelStars>=PER){ paused=true; TIM=setTimeout(doLevelEnd,3500); }
  else nextRound();
}

/* ── wire buttons — touchend for mobile, click for desktop ── */
function wire(id, fn) {
  var el = document.getElementById(id);
  el.addEventListener('touchend', function(e){ e.preventDefault(); fn(); }, {passive:false});
  el.addEventListener('click', fn);
}
wire('btn-start', doStart);
wire('btn-stop',  doStop);
wire('btn-again', doAgain);

/* ── game tap (on color-fill only, so buttons work separately) ── */
var fill = document.getElementById('color-fill');
